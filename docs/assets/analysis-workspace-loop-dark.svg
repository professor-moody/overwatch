<svg viewBox="0 0 660 280" xmlns="http://www.w3.org/2000/svg">
<style>
  text{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
  .th{font-size:13px;font-weight:500;fill:#e0e0e0}
  .ts{font-size:11px;fill:#9ca3af}
  .arr{stroke:#6b7280;stroke-width:1}
  .n-purple rect{fill:#26215C;stroke:#534AB7;stroke-width:.5}
  .n-purple .th{fill:#CCFFCC}.n-purple .ts{fill:#AFA9EC}
  .n-blue rect{fill:#0C3A6E;stroke:#378ADD;stroke-width:.5}
  .n-blue .th{fill:#B5D4F4}.n-blue .ts{fill:#85B7EB}
  .n-teal rect{fill:#053B30;stroke:#1D9E75;stroke-width:.5}
  .n-teal .th{fill:#9FE1CB}.n-teal .ts{fill:#5DCAA5}
  .n-amber rect{fill:#3A2800;stroke:#BA7517;stroke-width:.5}
  .n-amber .th{fill:#FAC775}.n-amber .ts{fill:#EF9F27}
  .n-coral rect{fill:#3E1508;stroke:#D85A30;stroke-width:.5}
  .n-coral .th{fill:#F5C4B3}.n-coral .ts{fill:#F0997B}
  .n-pink rect{fill:#3E1028;stroke:#D4537E;stroke-width:.5}
  .n-pink .th{fill:#F4C0D1}.n-pink .ts{fill:#ED93B1}
  .n-gray rect{fill:#1e1e1c;stroke:#5F5E5A;stroke-width:.5}
  .n-gray .th{fill:#D3D1C7}.n-gray .ts{fill:#B4B2A9}
  .n-red rect{fill:#3A0F0F;stroke:#A32D2D;stroke-width:.5}
  .n-red .th{fill:#F7C1C1}.n-red .ts{fill:#F09595}
</style>
<rect width="100%" height="100%" fill="transparent" rx="6"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <g class="n-amber"><rect x="30" y="40" width="160" height="48" rx="7"/><text class="th" x="110" y="58" text-anchor="middle" dominant-baseline="central">Tool output</text><text class="ts" x="110" y="74" text-anchor="middle" dominant-baseline="central">action stdout/stderr</text></g>
  <line x1="190" y1="64" x2="226" y2="64" class="arr" marker-end="url(#arr)"/>
  <g class="n-blue"><rect x="226" y="40" width="170" height="48" rx="7"/><text class="th" x="311" y="58" text-anchor="middle" dominant-baseline="central">Analysis workspace</text><text class="ts" x="311" y="74" text-anchor="middle" dominant-baseline="central">assess (live or after)</text></g>
  <line x1="396" y1="64" x2="432" y2="64" class="arr" marker-end="url(#arr)"/>
  <g class="n-coral"><rect x="432" y="40" width="170" height="48" rx="7"/><text class="th" x="517" y="58" text-anchor="middle" dominant-baseline="central">Re-parse</text><text class="ts" x="517" y="74" text-anchor="middle" dominant-baseline="central">parse_output / ingest_json</text></g>
  <line x1="517" y1="88" x2="517" y2="150" class="arr" marker-end="url(#arr)"/>
  <g class="n-teal"><rect x="432" y="150" width="170" height="48" rx="7"/><text class="th" x="517" y="168" text-anchor="middle" dominant-baseline="central">Graph findings</text><text class="ts" x="517" y="184" text-anchor="middle" dominant-baseline="central">nodes / edges</text></g>
  <line x1="432" y1="174" x2="398" y2="174" class="arr" marker-end="url(#arr)"/>
  <g class="n-purple"><rect x="226" y="150" width="170" height="48" rx="7"/><text class="th" x="311" y="168" text-anchor="middle" dominant-baseline="central">Deploy follow-up</text><text class="ts" x="311" y="184" text-anchor="middle" dominant-baseline="central">agent at findings</text></g>
  <path d="M311 150 L311 88" fill="none" class="arr" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text class="ts" x="330" y="120" text-anchor="start">loop</text>
  <text class="ts" x="311" y="238" text-anchor="middle">Suggest-only: the operator reviews each recommendation before an agent is dispatched</text>
</svg>
