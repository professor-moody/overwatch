<svg viewBox="0 0 700 470" xmlns="http://www.w3.org/2000/svg">
<style>
  text{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
  .th{font-size:13px;font-weight:500;fill:#e0e0e0}
  .ts{font-size:11px;fill:#9ca3af}
  .arr{stroke:#6b7280;stroke-width:1}
  .n-purple rect{fill:#26215C;stroke:#534AB7;stroke-width:.5}
  .n-purple .th{fill:#CCFFCC}.n-purple .ts{fill:#AFA9EC}
  .n-blue rect{fill:#0C3A6E;stroke:#378ADD;stroke-width:.5}
  .n-blue .th{fill:#B5D4F4}.n-blue .ts{fill:#85B7EB}
  .n-teal rect{fill:#053B30;stroke:#1D9E75;stroke-width:.5}
  .n-teal .th{fill:#9FE1CB}.n-teal .ts{fill:#5DCAA5}
  .n-amber rect{fill:#3A2800;stroke:#BA7517;stroke-width:.5}
  .n-amber .th{fill:#FAC775}.n-amber .ts{fill:#EF9F27}
  .n-coral rect{fill:#3E1508;stroke:#D85A30;stroke-width:.5}
  .n-coral .th{fill:#F5C4B3}.n-coral .ts{fill:#F0997B}
  .n-pink rect{fill:#3E1028;stroke:#D4537E;stroke-width:.5}
  .n-pink .th{fill:#F4C0D1}.n-pink .ts{fill:#ED93B1}
  .n-gray rect{fill:#1e1e1c;stroke:#5F5E5A;stroke-width:.5}
  .n-gray .th{fill:#D3D1C7}.n-gray .ts{fill:#B4B2A9}
  .n-red rect{fill:#3A0F0F;stroke:#A32D2D;stroke-width:.5}
  .n-red .th{fill:#F7C1C1}.n-red .ts{fill:#F09595}
</style>
<rect width="100%" height="100%" fill="transparent" rx="6"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <g class="n-purple"><rect x="200" y="14" width="300" height="44" rx="8"/><text class="th" x="350" y="36" text-anchor="middle" dominant-baseline="central">register_agent / dispatch_agents</text></g>
  <line x1="350" y1="58" x2="350" y2="80" class="arr" marker-end="url(#arr)"/>
  <g class="n-gray"><rect x="170" y="80" width="360" height="46" rx="8"/><text class="th" x="350" y="98" text-anchor="middle" dominant-baseline="central">GraphEngine: acquire frontier lease</text><text class="ts" x="350" y="114" text-anchor="middle" dominant-baseline="central">one agent per item; others wait</text></g>
  <line x1="350" y1="126" x2="350" y2="148" class="arr" marker-end="url(#arr)"/>
  <g class="n-amber"><rect x="150" y="148" width="400" height="50" rx="8"/><text class="th" x="350" y="166" text-anchor="middle" dominant-baseline="central">TaskExecutionService.resolveBackend()</text><text class="ts" x="350" y="182" text-anchor="middle" dominant-baseline="central">explicit backend › scripted-can-handle › HTTP endpoint?</text></g>
  <line x1="350" y1="198" x2="120" y2="236" class="arr" marker-end="url(#arr)"/><line x1="350" y1="198" x2="350" y2="236" class="arr" marker-end="url(#arr)"/><line x1="350" y1="198" x2="580" y2="236" class="arr" marker-end="url(#arr)"/>
  <g class="n-teal"><rect x="30" y="236" width="180" height="66" rx="8"/><text class="th" x="120" y="256" text-anchor="middle" dominant-baseline="central">scripted</text><text class="ts" x="120" y="273" text-anchor="middle" dominant-baseline="central">ScriptedAgentRunner</text><text class="ts" x="120" y="289" text-anchor="middle" dominant-baseline="central">deterministic, no LLM</text></g>
  <g class="n-purple"><rect x="260" y="236" width="180" height="66" rx="8"/><text class="th" x="350" y="256" text-anchor="middle" dominant-baseline="central">headless_mcp</text><text class="ts" x="350" y="273" text-anchor="middle" dominant-baseline="central">HeadlessMcpRunner</text><text class="ts" x="350" y="289" text-anchor="middle" dominant-baseline="central">isolated claude -p</text></g>
  <g class="n-gray"><rect x="490" y="236" width="180" height="66" rx="8"/><text class="th" x="580" y="256" text-anchor="middle" dominant-baseline="central">manual</text><text class="ts" x="580" y="273" text-anchor="middle" dominant-baseline="central">operator drives</text><text class="ts" x="580" y="289" text-anchor="middle" dominant-baseline="central">via dashboard</text></g>
  <line x1="350" y1="302" x2="350" y2="338" class="arr" marker-end="url(#arr)"/>
  <g class="n-teal"><rect x="255" y="338" width="190" height="46" rx="7"/><text class="th" x="350" y="356" text-anchor="middle" dominant-baseline="central">connects to /mcp</text><text class="ts" x="350" y="372" text-anchor="middle" dominant-baseline="central">same shared engine</text></g>
  <g class="n-coral"><rect x="150" y="408" width="400" height="46" rx="8"/><text class="th" x="350" y="426" text-anchor="middle" dominant-baseline="central">Archetype tool-surface boundary</text><text class="ts" x="350" y="442" text-anchor="middle" dominant-baseline="central">--allowedTools: BASE · EXECUTE · SESSIONS · CRED · ANALYZE</text></g>
</svg>
