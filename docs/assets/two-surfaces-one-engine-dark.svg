<svg viewBox="0 0 700 430" xmlns="http://www.w3.org/2000/svg">
<style>
  text{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
  .th{font-size:13px;font-weight:500;fill:#e0e0e0}
  .ts{font-size:11px;fill:#9ca3af}
  .arr{stroke:#6b7280;stroke-width:1}
  .n-purple rect{fill:#26215C;stroke:#534AB7;stroke-width:.5}
  .n-purple .th{fill:#CCFFCC}.n-purple .ts{fill:#AFA9EC}
  .n-blue rect{fill:#0C3A6E;stroke:#378ADD;stroke-width:.5}
  .n-blue .th{fill:#B5D4F4}.n-blue .ts{fill:#85B7EB}
  .n-teal rect{fill:#053B30;stroke:#1D9E75;stroke-width:.5}
  .n-teal .th{fill:#9FE1CB}.n-teal .ts{fill:#5DCAA5}
  .n-amber rect{fill:#3A2800;stroke:#BA7517;stroke-width:.5}
  .n-amber .th{fill:#FAC775}.n-amber .ts{fill:#EF9F27}
  .n-coral rect{fill:#3E1508;stroke:#D85A30;stroke-width:.5}
  .n-coral .th{fill:#F5C4B3}.n-coral .ts{fill:#F0997B}
  .n-pink rect{fill:#3E1028;stroke:#D4537E;stroke-width:.5}
  .n-pink .th{fill:#F4C0D1}.n-pink .ts{fill:#ED93B1}
  .n-gray rect{fill:#1e1e1c;stroke:#5F5E5A;stroke-width:.5}
  .n-gray .th{fill:#D3D1C7}.n-gray .ts{fill:#B4B2A9}
  .n-red rect{fill:#3A0F0F;stroke:#A32D2D;stroke-width:.5}
  .n-red .th{fill:#F7C1C1}.n-red .ts{fill:#F09595}
</style>
<rect width="100%" height="100%" fill="transparent" rx="6"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <g class="n-purple"><rect x="30" y="20" width="195" height="58" rx="8"/><text class="th" x="127" y="42" text-anchor="middle" dominant-baseline="central">Terminal · Claude Code</text><text class="ts" x="127" y="60" text-anchor="middle" dominant-baseline="central">primary operator session</text></g>
  <g class="n-purple"><rect x="252" y="20" width="196" height="58" rx="8"/><text class="th" x="350" y="42" text-anchor="middle" dominant-baseline="central">Headless sub-agents</text><text class="ts" x="350" y="60" text-anchor="middle" dominant-baseline="central">claude -p → back to /mcp</text></g>
  <g class="n-blue"><rect x="475" y="20" width="195" height="58" rx="8"/><text class="th" x="572" y="42" text-anchor="middle" dominant-baseline="central">Dashboard</text><text class="ts" x="572" y="60" text-anchor="middle" dominant-baseline="central">React UI (browser)</text></g>
  <line x1="127" y1="78" x2="127" y2="110" class="arr" marker-end="url(#arr)"/><line x1="350" y1="78" x2="350" y2="110" class="arr" marker-end="url(#arr)"/><line x1="572" y1="78" x2="572" y2="110" class="arr" marker-end="url(#arr)"/>
  <g class="n-teal"><rect x="30" y="110" width="418" height="40" rx="7"/><text class="th" x="239" y="130" text-anchor="middle" dominant-baseline="central">MCP server — stdio + HTTP /mcp</text></g>
  <g class="n-blue"><rect x="475" y="110" width="195" height="40" rx="7"/><text class="th" x="572" y="130" text-anchor="middle" dominant-baseline="central">Dashboard server — HTTP/WS</text></g>
  <line x1="239" y1="150" x2="239" y2="188" class="arr" marker-end="url(#arr)"/><line x1="572" y1="150" x2="572" y2="188" class="arr" marker-end="url(#arr)"/>
  <g class="n-amber"><rect x="30" y="188" width="640" height="132" rx="14"/><text class="th" x="350" y="208" text-anchor="middle" dominant-baseline="central">One GraphEngine — system of record + single executor</text></g>
  <g class="n-gray"><rect x="55" y="226" width="590" height="32" rx="6"/><text class="th" x="350" y="243" text-anchor="middle" dominant-baseline="central">EngineContext — shared mutable state</text></g>
  <g class="n-teal"><rect x="60" y="270" width="110" height="36" rx="6"/><text class="ts" x="115" y="288" text-anchor="middle" dominant-baseline="central">graph</text></g>
  <g class="n-teal"><rect x="182" y="270" width="110" height="36" rx="6"/><text class="ts" x="237" y="288" text-anchor="middle" dominant-baseline="central">agents</text></g>
  <g class="n-teal"><rect x="304" y="270" width="110" height="36" rx="6"/><text class="ts" x="359" y="288" text-anchor="middle" dominant-baseline="central">approvals</text></g>
  <g class="n-teal"><rect x="426" y="270" width="110" height="36" rx="6"/><text class="ts" x="481" y="288" text-anchor="middle" dominant-baseline="central">queries</text></g>
  <g class="n-teal"><rect x="548" y="270" width="104" height="36" rx="6"/><text class="ts" x="600" y="288" text-anchor="middle" dominant-baseline="central">activity log</text></g>
  <line x1="350" y1="320" x2="350" y2="350" class="arr" marker-end="url(#arr)"/>
  <g class="n-gray"><rect x="250" y="350" width="200" height="34" rx="7"/><text class="th" x="350" y="367" text-anchor="middle" dominant-baseline="central">state.json (per engagement)</text></g>
  <path d="M670 250 L690 250 L690 130 L670 130" fill="none" class="arr" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text class="ts" x="685" y="195" text-anchor="middle" transform="rotate(90 685 195)">WS deltas</text>
  <text class="ts" x="350" y="404" text-anchor="middle">One engine · one state file · one activity log — both surfaces see the same live state</text>
</svg>
