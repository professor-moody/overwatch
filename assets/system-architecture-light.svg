<svg viewBox="0 0 720 620" xmlns="http://www.w3.org/2000/svg">
<style>
  text{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
  .th{font-size:13px;font-weight:500;fill:#1e293b}
  .ts{font-size:11px;fill:#475569}
  .tx{font-size:10px;fill:#64748b}
  .arr{stroke:#94a3b8;stroke-width:1}
  .n-purple rect{fill:#ede9fe;stroke:#8b5cf6;stroke-width:.5}
  .n-purple .th{fill:#5b21b6}.n-purple .ts{fill:#7c3aed}
  .n-blue rect{fill:#dbeafe;stroke:#3b82f6;stroke-width:.5}
  .n-blue .th{fill:#1e40af}.n-blue .ts{fill:#2563eb}
  .n-teal rect{fill:#d1fae5;stroke:#10b981;stroke-width:.5}
  .n-teal .th{fill:#065f46}.n-teal .ts{fill:#059669}
  .n-amber rect{fill:#fef3c7;stroke:#f59e0b;stroke-width:.5}
  .n-amber .th{fill:#92400e}.n-amber .ts{fill:#b45309}
  .n-coral rect{fill:#fff7ed;stroke:#f97316;stroke-width:.5}
  .n-coral .th{fill:#9a3412}.n-coral .ts{fill:#ea580c}
  .n-pink rect{fill:#fce7f3;stroke:#ec4899;stroke-width:.5}
  .n-pink .th{fill:#9d174d}.n-pink .ts{fill:#db2777}
  .n-gray rect{fill:#f1f5f9;stroke:#94a3b8;stroke-width:.5}
  .n-gray .th{fill:#334155}.n-gray .ts{fill:#475569}
  .n-emerald rect{fill:#ecfdf5;stroke:#059669;stroke-width:.5}
  .n-emerald .th{fill:#047857}.n-emerald .ts{fill:#10b981}.n-emerald .tx{fill:#34d399}
  .n-violet rect{fill:#f3f4f6;stroke:#6366f1;stroke-width:.5}
  .n-violet .th{fill:#3730a3}.n-violet .ts{fill:#4f46e5}
</style>
<rect width="100%" height="100%" fill="#ffffff" rx="6"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <!-- LLM operator -->
  <g class="n-purple"><rect x="220" y="20" width="280" height="50" rx="8"/><text class="th" x="360" y="40" text-anchor="middle" dominant-baseline="central">LLM operator (Claude / Opus)</text><text class="ts" x="360" y="56" text-anchor="middle" dominant-baseline="central">Primary session + sub-agents</text></g>
  <line x1="310" y1="70" x2="310" y2="110" class="arr" marker-end="url(#arr)"/><line x1="410" y1="110" x2="410" y2="70" class="arr" marker-end="url(#arr)"/>
  <text class="ts" x="272" y="94" text-anchor="end">stdio / HTTP+SSE</text>

  <!-- MCP orchestrator container -->
  <g class="n-teal"><rect x="40" y="110" width="640" height="430" rx="14"/><text class="th" x="360" y="134" text-anchor="middle" dominant-baseline="central">MCP orchestrator server</text></g>

  <!-- Tools row -->
  <g class="n-blue"><rect x="70" y="150" width="580" height="36" rx="7"/><text class="th" x="360" y="168" text-anchor="middle" dominant-baseline="central">55+ MCP tools (Zod-validated)</text></g>

  <!-- Core engines -->
  <g class="n-amber"><rect x="70" y="200" width="180" height="50" rx="7"/><text class="th" x="160" y="218" text-anchor="middle" dominant-baseline="central">Graph engine</text><text class="ts" x="160" y="234" text-anchor="middle" dominant-baseline="central">graphology</text></g>
  <g class="n-coral"><rect x="270" y="200" width="180" height="50" rx="7"/><text class="th" x="360" y="218" text-anchor="middle" dominant-baseline="central">Inference engine</text><text class="ts" x="360" y="234" text-anchor="middle" dominant-baseline="central">53 rules</text></g>
  <g class="n-pink"><rect x="470" y="200" width="180" height="50" rx="7"/><text class="th" x="560" y="218" text-anchor="middle" dominant-baseline="central">Frontier + leases</text><text class="ts" x="560" y="234" text-anchor="middle" dominant-baseline="central">Next actions, TTL claims</text></g>
  <line x1="250" y1="225" x2="268" y2="225" class="arr" marker-end="url(#arr)"/><line x1="450" y1="225" x2="468" y2="225" class="arr" marker-end="url(#arr)"/>

  <!-- EngineContext bar -->
  <g class="n-gray"><rect x="70" y="266" width="580" height="36" rx="7"/><text class="th" x="360" y="284" text-anchor="middle" dominant-baseline="central">EngineContext — shared state, withClock, deterministic seq</text></g>

  <!-- Core services -->
  <g class="n-teal"><rect x="70" y="318" width="138" height="36" rx="6"/><text class="ts" x="139" y="336" text-anchor="middle" dominant-baseline="central">Path analyzer</text></g>
  <g class="n-teal"><rect x="218" y="318" width="138" height="36" rx="6"/><text class="ts" x="287" y="336" text-anchor="middle" dominant-baseline="central">Identity resolution</text></g>
  <g class="n-teal"><rect x="366" y="318" width="138" height="36" rx="6"/><text class="ts" x="435" y="336" text-anchor="middle" dominant-baseline="central">State persistence</text></g>
  <g class="n-teal"><rect x="514" y="318" width="138" height="36" rx="6"/><text class="ts" x="583" y="336" text-anchor="middle" dominant-baseline="central">21 parsers</text></g>

  <!-- Foundations row (NEW) -->
  <text class="tx" x="70" y="378" text-anchor="start">Foundations (engagements with engagement_nonce)</text>
  <g class="n-emerald"><rect x="70" y="384" width="92" height="44" rx="6"/><text class="ts" x="116" y="400" text-anchor="middle" dominant-baseline="central">Hash chain</text><text class="tx" x="116" y="414" text-anchor="middle" dominant-baseline="central">+ checkpoints</text></g>
  <g class="n-emerald"><rect x="170" y="384" width="92" height="44" rx="6"/><text class="ts" x="216" y="400" text-anchor="middle" dominant-baseline="central">WAL journal</text><text class="tx" x="216" y="414" text-anchor="middle" dominant-baseline="central">jsonl + replay</text></g>
  <g class="n-emerald"><rect x="270" y="384" width="92" height="44" rx="6"/><text class="ts" x="316" y="400" text-anchor="middle" dominant-baseline="central">Evidence store</text><text class="tx" x="316" y="414" text-anchor="middle" dominant-baseline="central">sha256-keyed</text></g>
  <g class="n-emerald"><rect x="370" y="384" width="92" height="44" rx="6"/><text class="ts" x="416" y="400" text-anchor="middle" dominant-baseline="central">Det. IDs</text><text class="tx" x="416" y="414" text-anchor="middle" dominant-baseline="central">act_/evt_ sha256</text></g>
  <g class="n-emerald"><rect x="470" y="384" width="92" height="44" rx="6"/><text class="ts" x="516" y="400" text-anchor="middle" dominant-baseline="central">Watchdog</text><text class="tx" x="516" y="414" text-anchor="middle" dominant-baseline="central">heartbeat reaper</text></g>
  <g class="n-emerald"><rect x="570" y="384" width="82" height="44" rx="6"/><text class="ts" x="611" y="400" text-anchor="middle" dominant-baseline="central">Golden</text><text class="tx" x="611" y="414" text-anchor="middle" dominant-baseline="central">replay tape</text></g>

  <!-- Visibility (derived) row -->
  <text class="tx" x="70" y="450" text-anchor="start">Visibility (derived views over the activity log)</text>
  <g class="n-violet"><rect x="70" y="456" width="186" height="40" rx="6"/><text class="ts" x="163" y="476" text-anchor="middle" dominant-baseline="central">Decision log</text></g>
  <g class="n-violet"><rect x="266" y="456" width="186" height="40" rx="6"/><text class="ts" x="359" y="476" text-anchor="middle" dominant-baseline="central">Timeline (what was true at T)</text></g>
  <g class="n-violet"><rect x="462" y="456" width="190" height="40" rx="6"/><text class="ts" x="557" y="476" text-anchor="middle" dominant-baseline="central">explain_action</text></g>

  <!-- Persistence to disk -->
  <g class="n-gray"><rect x="220" y="555" width="120" height="32" rx="6"/><text class="ts" x="280" y="571" text-anchor="middle" dominant-baseline="central">state.json</text></g>
  <g class="n-gray"><rect x="380" y="555" width="120" height="32" rx="6"/><text class="ts" x="440" y="571" text-anchor="middle" dominant-baseline="central">journal.jsonl</text></g>
  <line x1="280" y1="540" x2="280" y2="555" class="arr" marker-end="url(#arr)"/>
  <line x1="440" y1="540" x2="440" y2="555" class="arr" marker-end="url(#arr)"/>

</svg>
