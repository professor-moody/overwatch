<svg viewBox="0 0 720 620" xmlns="http://www.w3.org/2000/svg">
<style>
  text{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
  .th{font-size:13px;font-weight:500;fill:#1e293b}
  .ts{font-size:11px;fill:#475569}
  .tx{font-size:10px;fill:#64748b}
  .arr{stroke:#94a3b8;stroke-width:1}
  .n-purple rect{fill:#ede9fe;stroke:#8b5cf6;stroke-width:.5}
  .n-purple .th{fill:#5b21b6}.n-purple .ts{fill:#7c3aed}
  .n-blue rect{fill:#dbeafe;stroke:#3b82f6;stroke-width:.5}
  .n-blue .th{fill:#1e40af}.n-blue .ts{fill:#2563eb}
  .n-teal rect{fill:#d1fae5;stroke:#10b981;stroke-width:.5}
  .n-teal .th{fill:#065f46}.n-teal .ts{fill:#059669}
  .n-amber rect{fill:#fef3c7;stroke:#f59e0b;stroke-width:.5}
  .n-amber .th{fill:#92400e}.n-amber .ts{fill:#b45309}
  .n-coral rect{fill:#fff7ed;stroke:#f97316;stroke-width:.5}
  .n-coral .th{fill:#9a3412}.n-coral .ts{fill:#ea580c}
  .n-pink rect{fill:#fce7f3;stroke:#ec4899;stroke-width:.5}
  .n-pink .th{fill:#9d174d}.n-pink .ts{fill:#db2777}
  .n-gray rect{fill:#f1f5f9;stroke:#94a3b8;stroke-width:.5}
  .n-gray .th{fill:#334155}.n-gray .ts{fill:#475569}
  .n-emerald rect{fill:#ecfdf5;stroke:#059669;stroke-width:.5}
  .n-emerald .th{fill:#047857}.n-emerald .ts{fill:#10b981}
  .n-violet rect{fill:#f3f4f6;stroke:#6366f1;stroke-width:.5}
  .n-violet .th{fill:#3730a3}.n-violet .ts{fill:#4f46e5}
</style>
<rect width="100%" height="100%" fill="#ffffff" rx="6"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <g class="n-amber"><rect x="220" y="10" width="280" height="36" rx="7"/><text class="th" x="360" y="28" text-anchor="middle" dominant-baseline="central">GraphEngine (thin facade)</text></g>
  <line x1="360" y1="46" x2="360" y2="64" class="arr" marker-end="url(#arr)"/>
  <g class="n-gray"><rect x="100" y="64" width="520" height="44" rx="8"/><text class="th" x="360" y="80" text-anchor="middle" dominant-baseline="central">EngineContext (shared mutable state)</text><text class="ts" x="360" y="96" text-anchor="middle" dominant-baseline="central">graph, config, rules, agents, activity log, callbacks, coldStore, withClock, deterministic seq</text></g>

  <!-- Core engines row -->
  <line x1="140" y1="108" x2="140" y2="126" class="arr" marker-end="url(#arr)"/>
  <line x1="290" y1="108" x2="290" y2="126" class="arr" marker-end="url(#arr)"/>
  <line x1="440" y1="108" x2="440" y2="126" class="arr" marker-end="url(#arr)"/>
  <line x1="580" y1="108" x2="580" y2="126" class="arr" marker-end="url(#arr)"/>
  <g class="n-teal"><rect x="68" y="126" width="148" height="44" rx="6"/><text class="th" x="142" y="142" text-anchor="middle" dominant-baseline="central">Inference engine</text><text class="ts" x="142" y="158" text-anchor="middle" dominant-baseline="central">53 rules, selectors</text></g>
  <g class="n-blue"><rect x="226" y="126" width="148" height="44" rx="6"/><text class="th" x="300" y="142" text-anchor="middle" dominant-baseline="central">Frontier + leases</text><text class="ts" x="300" y="158" text-anchor="middle" dominant-baseline="central">5 item types · TTL claims</text></g>
  <g class="n-purple"><rect x="384" y="126" width="148" height="44" rx="6"/><text class="th" x="458" y="142" text-anchor="middle" dominant-baseline="central">Path analyzer</text><text class="ts" x="458" y="158" text-anchor="middle" dominant-baseline="central">BFS, objectives</text></g>
  <g class="n-coral"><rect x="542" y="126" width="148" height="44" rx="6"/><text class="th" x="616" y="142" text-anchor="middle" dominant-baseline="central">State persistence</text><text class="ts" x="616" y="158" text-anchor="middle" dominant-baseline="central">Atomic + WAL replay</text></g>

  <!-- Foundations row -->
  <text class="th" x="360" y="196" text-anchor="middle" dominant-baseline="central">Foundations (deterministic IDs · audit · replay)</text>
  <g class="n-emerald"><rect x="44" y="210" width="120" height="40" rx="5"/><text class="ts" x="104" y="224" text-anchor="middle" dominant-baseline="central">Activity chain</text><text class="tx" x="104" y="238" text-anchor="middle" dominant-baseline="central">+ checkpoints</text></g>
  <g class="n-emerald"><rect x="174" y="210" width="120" height="40" rx="5"/><text class="ts" x="234" y="224" text-anchor="middle" dominant-baseline="central">Mutation journal</text><text class="tx" x="234" y="238" text-anchor="middle" dominant-baseline="central">WAL + replay</text></g>
  <g class="n-emerald"><rect x="304" y="210" width="120" height="40" rx="5"/><text class="ts" x="364" y="224" text-anchor="middle" dominant-baseline="central">Evidence store</text><text class="tx" x="364" y="238" text-anchor="middle" dominant-baseline="central">sha256-keyed</text></g>
  <g class="n-emerald"><rect x="434" y="210" width="120" height="40" rx="5"/><text class="ts" x="494" y="224" text-anchor="middle" dominant-baseline="central">Deterministic IDs</text><text class="tx" x="494" y="238" text-anchor="middle" dominant-baseline="central">act_/evt_ sha256</text></g>
  <g class="n-emerald"><rect x="564" y="210" width="120" height="40" rx="5"/><text class="ts" x="624" y="224" text-anchor="middle" dominant-baseline="central">Golden replay</text><text class="tx" x="624" y="238" text-anchor="middle" dominant-baseline="central">tape harness</text></g>

  <!-- Visibility (derived) row -->
  <text class="th" x="360" y="276" text-anchor="middle" dominant-baseline="central">Visibility (derived from activity log)</text>
  <g class="n-violet"><rect x="68" y="290" width="180" height="36" rx="5"/><text class="ts" x="158" y="308" text-anchor="middle" dominant-baseline="central">Decision log</text></g>
  <g class="n-violet"><rect x="270" y="290" width="180" height="36" rx="5"/><text class="ts" x="360" y="308" text-anchor="middle" dominant-baseline="central">Timeline (state at T)</text></g>
  <g class="n-violet"><rect x="472" y="290" width="180" height="36" rx="5"/><text class="ts" x="562" y="308" text-anchor="middle" dominant-baseline="central">explain_action introspection</text></g>

  <!-- Supporting services -->
  <text class="th" x="360" y="350" text-anchor="middle" dominant-baseline="central">Supporting services</text>
  <g class="n-gray"><rect x="44" y="364" width="120" height="36" rx="5"/><text class="ts" x="104" y="382" text-anchor="middle" dominant-baseline="central">Identity resolution</text></g>
  <g class="n-gray"><rect x="174" y="364" width="120" height="36" rx="5"/><text class="ts" x="234" y="382" text-anchor="middle" dominant-baseline="central">Identity reconcile</text></g>
  <g class="n-gray"><rect x="304" y="364" width="120" height="36" rx="5"/><text class="ts" x="364" y="382" text-anchor="middle" dominant-baseline="central">Cold store</text></g>
  <g class="n-gray"><rect x="434" y="364" width="120" height="36" rx="5"/><text class="ts" x="494" y="382" text-anchor="middle" dominant-baseline="central">Graph health</text></g>
  <g class="n-gray"><rect x="564" y="364" width="120" height="36" rx="5"/><text class="ts" x="624" y="382" text-anchor="middle" dominant-baseline="central">Graph schema</text></g>

  <!-- Operational services -->
  <text class="th" x="360" y="424" text-anchor="middle" dominant-baseline="central">Operational services</text>
  <g class="n-pink"><rect x="44" y="438" width="120" height="36" rx="5"/><text class="ts" x="104" y="456" text-anchor="middle" dominant-baseline="central">Session mgr</text></g>
  <g class="n-pink"><rect x="174" y="438" width="120" height="36" rx="5"/><text class="ts" x="234" y="456" text-anchor="middle" dominant-baseline="central">Agent mgr + watchdog</text></g>
  <g class="n-pink"><rect x="304" y="438" width="120" height="36" rx="5"/><text class="ts" x="364" y="456" text-anchor="middle" dominant-baseline="central">Sub-agent IPC</text></g>
  <g class="n-pink"><rect x="434" y="438" width="120" height="36" rx="5"/><text class="ts" x="494" y="456" text-anchor="middle" dominant-baseline="central">Output parsers</text></g>
  <g class="n-pink"><rect x="564" y="438" width="120" height="36" rx="5"/><text class="ts" x="624" y="456" text-anchor="middle" dominant-baseline="central">Skill index / prompts</text></g>
  <g class="n-pink"><rect x="44" y="486" width="120" height="36" rx="5"/><text class="ts" x="104" y="504" text-anchor="middle" dominant-baseline="central">Report gen</text></g>
  <g class="n-pink"><rect x="174" y="486" width="120" height="36" rx="5"/><text class="ts" x="234" y="504" text-anchor="middle" dominant-baseline="central">Retrospective</text></g>
  <g class="n-pink"><rect x="304" y="486" width="120" height="36" rx="5"/><text class="ts" x="364" y="504" text-anchor="middle" dominant-baseline="central">OPSEC + phase policy</text></g>
  <g class="n-pink"><rect x="434" y="486" width="120" height="36" rx="5"/><text class="ts" x="494" y="504" text-anchor="middle" dominant-baseline="central">Credential utils</text></g>
  <g class="n-pink"><rect x="564" y="486" width="120" height="36" rx="5"/><text class="ts" x="624" y="504" text-anchor="middle" dominant-baseline="central">Process tracker</text></g>

  <!-- Transport + UI -->
  <text class="th" x="360" y="546" text-anchor="middle" dominant-baseline="central">Transport + UI</text>
  <g class="n-blue"><rect x="68" y="560" width="170" height="36" rx="6"/><text class="ts" x="153" y="578" text-anchor="middle" dominant-baseline="central">stdio (MCP default)</text></g>
  <g class="n-blue"><rect x="258" y="560" width="200" height="36" rx="6"/><text class="ts" x="358" y="578" text-anchor="middle" dominant-baseline="central">HTTP/SSE (streamable)</text></g>
  <g class="n-blue"><rect x="478" y="560" width="200" height="36" rx="6"/><text class="ts" x="578" y="578" text-anchor="middle" dominant-baseline="central">Dashboard (WS + sigma.js)</text></g>
</svg>
