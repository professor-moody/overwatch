<svg viewBox="0 0 760 700" xmlns="http://www.w3.org/2000/svg">
<style>
  text{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
  .th{font-size:13px;font-weight:500;fill:#e0e0e0}
  .ts{font-size:11px;fill:#9ca3af}
  .tx{font-size:10px;fill:#7a8290}
  .arr{stroke:#6b7280;stroke-width:1}
  .n-purple rect{fill:#26215C;stroke:#534AB7;stroke-width:.5}
  .n-purple .th{fill:#CCFFCC}.n-purple .ts{fill:#AFA9EC}
  .n-blue rect{fill:#0C3A6E;stroke:#378ADD;stroke-width:.5}
  .n-blue .th{fill:#B5D4F4}.n-blue .ts{fill:#85B7EB}
  .n-teal rect{fill:#053B30;stroke:#1D9E75;stroke-width:.5}
  .n-teal .th{fill:#9FE1CB}.n-teal .ts{fill:#5DCAA5}
  .n-amber rect{fill:#3A2800;stroke:#BA7517;stroke-width:.5}
  .n-amber .th{fill:#FAC775}.n-amber .ts{fill:#EF9F27}
  .n-coral rect{fill:#3E1508;stroke:#D85A30;stroke-width:.5}
  .n-coral .th{fill:#F5C4B3}.n-coral .ts{fill:#F0997B}
  .n-pink rect{fill:#3E1028;stroke:#D4537E;stroke-width:.5}
  .n-pink .th{fill:#F4C0D1}.n-pink .ts{fill:#ED93B1}
  .n-gray rect{fill:#1e1e1c;stroke:#5F5E5A;stroke-width:.5}
  .n-gray .th{fill:#D3D1C7}.n-gray .ts{fill:#B4B2A9}
  .n-emerald rect{fill:#03241B;stroke:#0E9468;stroke-width:.5}
  .n-emerald .th{fill:#A8EBD0}.n-emerald .ts{fill:#5DCAA5}
  .n-violet rect{fill:#1A1A36;stroke:#4F46E5;stroke-width:.5}
  .n-violet .th{fill:#C7D2FE}.n-violet .ts{fill:#A5B4FC}
</style>
<rect width="100%" height="100%" fill="transparent" rx="6"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <g class="n-purple"><rect x="180" y="10" width="360" height="48" rx="7"/><text class="th" x="360" y="28" text-anchor="middle" dominant-baseline="central">1. validate_action() → act_&lt;sha256&gt;</text><text class="ts" x="360" y="44" text-anchor="middle" dominant-baseline="central">Deterministic ID (engagement_nonce | agent | seq)</text></g>
  <line x1="360" y1="58" x2="360" y2="74" class="arr" marker-end="url(#arr)"/>
  <g class="n-blue"><rect x="180" y="74" width="360" height="48" rx="7"/><text class="th" x="360" y="92" text-anchor="middle" dominant-baseline="central">2. Deterministic validation</text><text class="ts" x="360" y="108" text-anchor="middle" dominant-baseline="central">Scope, dedup, OPSEC check, frontier lease</text></g>
  <line x1="360" y1="122" x2="360" y2="138" class="arr" marker-end="url(#arr)"/>
  <g class="n-gray"><rect x="180" y="138" width="360" height="48" rx="7"/><text class="th" x="360" y="156" text-anchor="middle" dominant-baseline="central">3. log_action_event(started)</text><text class="ts" x="360" y="172" text-anchor="middle" dominant-baseline="central">Hash-chained activity entry (when chain enabled)</text></g>
  <line x1="360" y1="186" x2="360" y2="202" class="arr" marker-end="url(#arr)"/>
  <g class="n-amber"><rect x="180" y="202" width="360" height="48" rx="7"/><text class="th" x="360" y="220" text-anchor="middle" dominant-baseline="central">4. Execute (bash / nmap / nxc)</text><text class="ts" x="360" y="236" text-anchor="middle" dominant-baseline="central">Claude Code native bash</text></g>
  <line x1="360" y1="250" x2="360" y2="266" class="arr" marker-end="url(#arr)"/>
  <g class="n-coral"><rect x="60" y="266" width="280" height="56" rx="7"/><text class="th" x="200" y="284" text-anchor="middle" dominant-baseline="central">5a. parse_output()</text><text class="ts" x="200" y="300" text-anchor="middle" dominant-baseline="central">21 parsers / 36 aliases</text><text class="tx" x="200" y="314" text-anchor="middle" dominant-baseline="central">evidence keyed by sha256(content)</text></g>
  <g class="n-coral"><rect x="380" y="266" width="280" height="56" rx="7"/><text class="th" x="520" y="284" text-anchor="middle" dominant-baseline="central">5b. report_finding()</text><text class="ts" x="520" y="300" text-anchor="middle" dominant-baseline="central">Manual nodes/edges</text><text class="tx" x="520" y="314" text-anchor="middle" dominant-baseline="central">evidence sha256 dedups identical blobs</text></g>
  <text class="ts" x="360" y="294" text-anchor="middle">or</text>
  <line x1="200" y1="322" x2="200" y2="346" class="arr" marker-end="url(#arr)"/><line x1="520" y1="322" x2="520" y2="346" class="arr" marker-end="url(#arr)"/>
  <g class="n-teal"><rect x="80" y="346" width="560" height="48" rx="7"/><text class="th" x="360" y="364" text-anchor="middle" dominant-baseline="central">6. Graph engine ingests</text><text class="ts" x="360" y="380" text-anchor="middle" dominant-baseline="central">Identity resolution, dedup, cold store triage</text></g>
  <line x1="360" y1="394" x2="360" y2="410" class="arr" marker-end="url(#arr)"/>
  <g class="n-pink"><rect x="120" y="410" width="480" height="48" rx="7"/><text class="th" x="360" y="428" text-anchor="middle" dominant-baseline="central">7. Inference rules fire</text><text class="ts" x="360" y="444" text-anchor="middle" dominant-baseline="central">Hypothesis edges (confidence 0.3–0.7)</text></g>
  <line x1="360" y1="458" x2="360" y2="474" class="arr" marker-end="url(#arr)"/>
  <g class="n-blue"><rect x="120" y="474" width="480" height="56" rx="7"/><text class="th" x="360" y="492" text-anchor="middle" dominant-baseline="central">8. Frontier recomputed + state persisted</text><text class="ts" x="360" y="508" text-anchor="middle" dominant-baseline="central">Atomic write-rename, snapshot rotation</text><text class="tx" x="360" y="522" text-anchor="middle" dominant-baseline="central">+ WAL append (journal.jsonl) for crash-safe replay</text></g>
  <line x1="360" y1="530" x2="360" y2="546" class="arr" marker-end="url(#arr)"/>
  <g class="n-gray"><rect x="120" y="546" width="480" height="48" rx="7"/><text class="th" x="360" y="564" text-anchor="middle" dominant-baseline="central">9. Dashboard broadcast + next_task()</text><text class="ts" x="360" y="580" text-anchor="middle" dominant-baseline="central">WebSocket delta → UI; frontier → LLM</text></g>
  <line x1="360" y1="594" x2="360" y2="610" class="arr" marker-end="url(#arr)" stroke-dasharray="3 2"/>
  <g class="n-violet"><rect x="120" y="610" width="480" height="44" rx="7"/><text class="th" x="360" y="626" text-anchor="middle" dominant-baseline="central">10. Derived views (read-only)</text><text class="ts" x="360" y="642" text-anchor="middle" dominant-baseline="central">decision log · timeline · explain_action — pure functions over the activity log</text></g>

  <!-- Loop arrow back to top -->
  <path d="M600 570 L690 570 L690 34 L542 34" fill="none" class="arr" marker-end="url(#arr)" stroke-dasharray="4 3"/>
  <text class="ts" x="700" y="320" text-anchor="start" transform="rotate(90 700 320)">Loop</text>

  <!-- Foundations annotation -->
  <g class="n-emerald"><rect x="20" y="610" width="92" height="44" rx="6"/><text class="ts" x="66" y="626" text-anchor="middle" dominant-baseline="central">Foundations</text><text class="tx" x="66" y="640" text-anchor="middle" dominant-baseline="central">enable replay</text></g>
</svg>
