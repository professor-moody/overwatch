<svg viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg">
<style>
  text{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
  .th{font-size:13px;font-weight:500;fill:#e0e0e0}
  .ts{font-size:11px;fill:#9ca3af}
  .tx{font-size:10px;fill:#7a8290}
  .arr{stroke:#6b7280;stroke-width:1}
  .n-purple rect{fill:#26215C;stroke:#534AB7;stroke-width:.5}
  .n-purple .th{fill:#CCFFCC}.n-purple .ts{fill:#AFA9EC}
  .n-blue rect{fill:#0C3A6E;stroke:#378ADD;stroke-width:.5}
  .n-blue .th{fill:#B5D4F4}.n-blue .ts{fill:#85B7EB}
  .n-amber rect{fill:#3A2800;stroke:#BA7517;stroke-width:.5}
  .n-amber .th{fill:#FAC775}.n-amber .ts{fill:#EF9F27}
  .n-coral rect{fill:#3E1508;stroke:#D85A30;stroke-width:.5}
  .n-coral .th{fill:#F5C4B3}.n-coral .ts{fill:#F0997B}
  .n-gray rect{fill:#1e1e1c;stroke:#5F5E5A;stroke-width:.5}
  .n-gray .th{fill:#D3D1C7}.n-gray .ts{fill:#B4B2A9}
  .n-emerald rect{fill:#03241B;stroke:#0E9468;stroke-width:.5}
  .n-emerald .th{fill:#A8EBD0}.n-emerald .ts{fill:#5DCAA5}.n-emerald .tx{fill:#3FA67E}
</style>
<rect width="100%" height="100%" fill="transparent" rx="6"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <!-- Triggering events -->
  <g class="n-coral"><rect x="40" y="20" width="160" height="40" rx="7"/><text class="ts" x="120" y="40" text-anchor="middle" dominant-baseline="central">Context compaction</text></g>
  <g class="n-coral"><rect x="220" y="20" width="160" height="40" rx="7"/><text class="ts" x="300" y="40" text-anchor="middle" dominant-baseline="central">Server restart</text></g>
  <g class="n-coral"><rect x="400" y="20" width="160" height="40" rx="7"/><text class="ts" x="480" y="40" text-anchor="middle" dominant-baseline="central">Session handoff</text></g>
  <g class="n-coral"><rect x="580" y="20" width="100" height="40" rx="7"/><text class="ts" x="630" y="40" text-anchor="middle" dominant-baseline="central">Crash / kill -9</text></g>
  <line x1="120" y1="60" x2="120" y2="86" class="arr" marker-end="url(#arr)"/>
  <line x1="300" y1="60" x2="300" y2="86" class="arr" marker-end="url(#arr)"/>
  <line x1="480" y1="60" x2="480" y2="86" class="arr" marker-end="url(#arr)"/>
  <line x1="630" y1="60" x2="630" y2="86" class="arr" marker-end="url(#arr)"/>

  <!-- Persistence guarantee -->
  <g class="n-amber"><rect x="40" y="86" width="640" height="50" rx="10"/><text class="th" x="360" y="104" text-anchor="middle" dominant-baseline="central">Graph lives outside the context window</text><text class="ts" x="360" y="122" text-anchor="middle" dominant-baseline="central">MCP server = external persistent process, not a prompt</text></g>
  <line x1="360" y1="136" x2="360" y2="160" class="arr" marker-end="url(#arr)"/>

  <!-- Two-track persistence: snapshot + WAL -->
  <g class="n-gray"><rect x="40" y="160" width="320" height="60" rx="8"/><text class="th" x="200" y="180" text-anchor="middle" dominant-baseline="central">Periodic snapshot</text><text class="ts" x="200" y="198" text-anchor="middle" dominant-baseline="central">Atomic write-rename → state.json</text><text class="tx" x="200" y="212" text-anchor="middle" dominant-baseline="central">snapshot rotation (cap 5)</text></g>
  <g class="n-emerald"><rect x="380" y="160" width="300" height="60" rx="8"/><text class="th" x="530" y="180" text-anchor="middle" dominant-baseline="central">Mutation journal (WAL)</text><text class="ts" x="530" y="198" text-anchor="middle" dominant-baseline="central">journal.jsonl — append-only per mutation</text><text class="tx" x="530" y="212" text-anchor="middle" dominant-baseline="central">truncates after each new snapshot</text></g>

  <line x1="200" y1="220" x2="200" y2="246" class="arr" marker-end="url(#arr)"/>
  <line x1="530" y1="220" x2="530" y2="246" class="arr" marker-end="url(#arr)"/>

  <!-- Recovery -->
  <g class="n-blue"><rect x="40" y="246" width="640" height="56" rx="8"/><text class="th" x="360" y="266" text-anchor="middle" dominant-baseline="central">Recovery: load latest snapshot, then replay journal entries with sequence &gt; snapshot.sequence</text><text class="ts" x="360" y="284" text-anchor="middle" dominant-baseline="central">Survives kill -9 mid-mutation; graph matches non-killed control byte-for-byte</text></g>
  <line x1="360" y1="302" x2="360" y2="328" class="arr" marker-end="url(#arr)"/>

  <!-- get_state -->
  <g class="n-blue"><rect x="100" y="328" width="520" height="40" rx="7"/><text class="th" x="360" y="348" text-anchor="middle" dominant-baseline="central">get_state() reconstructs complete briefing</text></g>
  <line x1="360" y1="368" x2="360" y2="392" class="arr" marker-end="url(#arr)"/>

  <!-- Reconstructed state -->
  <g class="n-purple"><rect x="40" y="392" width="640" height="80" rx="12"/><text class="th" x="360" y="412" text-anchor="middle" dominant-baseline="central">Reconstructed engagement state</text></g>
  <g class="n-purple"><rect x="62" y="428" width="100" height="30" rx="5"/><text class="ts" x="112" y="443" text-anchor="middle" dominant-baseline="central">Scope + config</text></g>
  <g class="n-purple"><rect x="174" y="428" width="100" height="30" rx="5"/><text class="ts" x="224" y="443" text-anchor="middle" dominant-baseline="central">All discoveries</text></g>
  <g class="n-purple"><rect x="286" y="428" width="100" height="30" rx="5"/><text class="ts" x="336" y="443" text-anchor="middle" dominant-baseline="central">Frontier items</text></g>
  <g class="n-purple"><rect x="398" y="428" width="100" height="30" rx="5"/><text class="ts" x="448" y="443" text-anchor="middle" dominant-baseline="central">Active agents</text></g>
  <g class="n-purple"><rect x="510" y="428" width="150" height="30" rx="5"/><text class="ts" x="585" y="443" text-anchor="middle" dominant-baseline="central">Recent activity + chain</text></g>

  <!-- Golden master -->
  <g class="n-emerald"><rect x="40" y="494" width="640" height="50" rx="10"/><text class="th" x="360" y="513" text-anchor="middle" dominant-baseline="central">Replay equivalence: golden-master tape + engagement_nonce → byte-identical graph</text><text class="ts" x="360" y="531" text-anchor="middle" dominant-baseline="central">replayTape() + hashGraph() — CI gate against silent regressions in parsers, ingest, inference</text></g>

</svg>
